<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Categorías</title>
  <link rel="stylesheet" href="/src/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">🍕 Food Store</div>

      <div class="admin-section-title">Administración</div>
      <div class="admin-section-subtitle">Panel de control</div>

      <nav class="admin-menu">
        <a href="../home/home.html">📊 Dashboard</a>
        <a class="active" href="./categories.html">📁 Categorías</a>
        <a href="../products/products.html">🍔 Productos</a>
        <a href="../orders/orders.html">📦 Pedidos</a>
        <a href="../../store/home/home.html">🏪 Ver tienda</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <a href="../../store/home/home.html">Tienda</a>
        <a href="../home/home.html">Panel Admin</a>
        <span>Admin</span>
        <button id="logoutButton" class="admin-logout">Cerrar sesión</button>
      </header>

      <section class="admin-content">
        <div class="admin-page-header">
          <h1>Gestión de Categorías</h1>
          <button id="openModalButton" class="admin-primary-button">
            + Nueva Categoría
          </button>
        </div>

        <div class="admin-table-card">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="categoriesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="categoryModal" class="admin-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 id="modalTitle">Nueva Categoría</h2>
        <button id="closeModalButton" class="admin-close-button">×</button>
      </div>

      <form id="categoryForm" class="admin-form">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" required>

        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" required></textarea>

        <button id="submitButton" type="submit" class="admin-submit-button">
          Guardar
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="./categories.ts"></script>
</body>
</html>
