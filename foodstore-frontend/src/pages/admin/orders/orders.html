<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pedidos Admin</title>
  <link rel="stylesheet" href="/src/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">🍕 Food Store</div>

      <div class="admin-section-title">Administración</div>
      <div class="admin-section-subtitle">Panel de control</div>

      <nav class="admin-menu">
        <a href="../home/home.html">📊 Dashboard</a>
        <a href="../categories/categories.html">📁 Categorías</a>
        <a href="../products/products.html">🍔 Productos</a>
        <a class="active" href="./orders.html">📦 Pedidos</a>
        <a href="../../store/home/home.html">🏪 Ver tienda</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <a href="../../store/home/home.html">Tienda</a>
        <a href="../home/home.html">Panel Admin</a>
        <span>Admin</span>
        <button id="logoutButton" class="admin-logout">Cerrar sesión</button>
      </header>

      <section class="admin-content">
        <div class="admin-page-header">
          <h1>Gestión de Pedidos</h1>

          <select id="estadoFilter">
            <option value="TODOS">Todos los estados</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADO">Confirmado</option>
            <option value="EN_PREPARACION">En preparación</option>
            <option value="ENVIADO">Enviado</option>
            <option value="ENTREGADO">Entregado</option>
            <option value="TERMINADO">Terminado</option>
            <option value="CANCELADO">Cancelado</option>
          </select>
        </div>

        <div id="ordersContainer" class="admin-orders-grid"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
