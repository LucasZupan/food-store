<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Login</title>
  <link rel="stylesheet" href="/src/styles/auth.css" />
</head>
<body>
  <main class="container">
    <form id="form" class="login-form">
      <h1>Food Store</h1>
      <h2>Iniciar sesión</h2>

      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        autocomplete="off"
        placeholder="example@example.com"
        required
      />

      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="off"
        placeholder="********"
        required
      />

      <button type="submit">Ingresar</button>

      <p>¿No tenés cuenta? <a href="../registro/registro.html">Registrate acá</a></p>
    </form>
  </main>

  <script type="module" src="./login.ts"></script>
</body>
</html>
